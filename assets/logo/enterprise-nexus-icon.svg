    <line x1="-50.2" y1="29" x2="-50.2" y2="-29" stroke="#00C2A8" stroke-width="3.2"/>
    <line x1="-50.2" y1="-29" x2="0" y2="-58" stroke="#00C2A8" stroke-width="3.2"/>

    <line x1="0" y1="-58" x2="0" y2="58" stroke="#00C2A8" stroke-width="1.3" opacity="0.45"/>
