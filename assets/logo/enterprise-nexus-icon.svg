    <circle cx="0" cy="58" r="10.5" fill="#00C2A8"/>
    <circle cx="-50.2" cy="29" r="10.5" fill="#00C2A8"/>
    <circle cx="-50.2" cy="-29" r="10.5" fill="#00C2A8"/>
    <circle cx="0" cy="0" r="13" fill="#0F1117" stroke="#00C2A8" stroke-width="1.5"/>
