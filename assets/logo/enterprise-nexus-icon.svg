<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <title>Enterprise Nexus icon</title>
  <desc>Enterprise Nexus icon mark — hexagonal six-node agent network</desc>

  <rect x="0" y="0" width="200" height="200" rx="40" fill="#0F1117"/>

  <g transform="translate(100,100)">
    <line x1="0" y1="-58" x2="50.2" y2="-29" stroke="#00C2A8" stroke-width="3.2"/>
    <line x1="50.2" y1="-29" x2="50.2" y2="29" stroke="#00C2A8" stroke-width="3.2"/>
