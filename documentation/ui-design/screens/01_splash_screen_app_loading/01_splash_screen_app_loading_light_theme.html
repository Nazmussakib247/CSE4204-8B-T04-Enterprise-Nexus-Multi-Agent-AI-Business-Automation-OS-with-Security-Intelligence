<style>
        @keyframes progress {
            0% { width: 0%; }
            20% { width: 15%; }
            40% { width: 45%; }
            70% { width: 85%; }
            100% { width: 100%; }
        }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.2; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1.1); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .animate-progress {
            animation: progress 4s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }

        .dot-delay-1 { animation: dotPulse 1.5s infinite 0.2s; }
        .dot-delay-2 { animation: dotPulse 1.5s infinite 0.4s; }
        .dot-delay-3 { animation: dotPulse 1.5s infinite 0.6s; }
        .dot-delay-4 { animation: dotPulse 1.5s infinite 0.8s; }
        .dot-delay-5 { animation: dotPulse 1.5s infinite 1.0s; }
        .dot-delay-6 { animation: dotPulse 1.5s infinite 1.2s; }

        .thinking-dots::after {
            content: '...';
            display: inline-block;
            width: 1.5em;
            animation: ellipsis 1.5s infinite steps(4);
            text-align: left;
        }

        @keyframes ellipsis {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>

<svg class="transition-transform duration-700 hover:scale-110" fill="none" height="64" viewbox="0 0 64 64" width="64" xmlns="http://www.w3.org/2000/svg">

<path d="M32 8L52.7846 20V44L32 56L11.2154 44V20L32 8Z" opacity="0.3" stroke="#00C2A8" stroke-dasharray="2 2" stroke-width="1"></path>

<circle class="dot-delay-1" cx="32" cy="8" fill="#00C2A8" r="4"></circle>
<circle class="dot-delay-2" cx="52.7846" cy="20" fill="#00C2A8" r="4"></circle>
<circle class="dot-delay-3" cx="52.7846" cy="44" fill="#00C2A8" r="4"></circle>

<circle class="dot-delay-6" cx="11.2154" cy="20" fill="#00C2A8" r="4"></circle>
<!-- Center Core (Implicit) -->
<circle class="animate-pulse" cx="32" cy="32" fill="#00C2A8" r="2"></circle>
</svg>
</div>

<!-- Loader Component -->

<div class="h-[2px] w-full bg-border overflow-hidden">
<div class="h-full bg-teal-nexus animate-progress"></div>

</div>
</main>
<script>
        // Simple counter for the loader percentage
        let progress = 0;
        const percentageElement = document.getElementById('load-percentage');
        
        const interval = setInterval(() => {
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                // In a real app, this is where navigation to the dashboard would happen
                console.log('OS Ready');
            } else {
                // Non-linear progress simulation
                const increment = Math.random() * 5;
                progress += increment;
                if(progress > 100) progress = 100;
                percentageElement.innerText = Math.floor(progress) + '%';
            }
        }, 150);

        // Interactive subtle mouse tracking for the logo
        document.addEventListener('mousemove', (e) => {
            const logo = document.querySelector('svg');
            if (logo) {
                const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
                const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
                logo.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
            }
        });
    </script>
